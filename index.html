<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SNOW Voice Assistant</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07080d;
      --panel: rgba(16, 18, 26, 0.78);
      --panel-strong: rgba(20, 24, 35, 0.95);
      --line: rgba(133, 158, 190, 0.18);
      --text: #eef5ff;
      --muted: #98a6ba;
      --soft: #c9d7ea;
      --accent: #8b5cf6;
      --accent-2: #66e3ff;
      --accent-3: #b7f7d1;
      --danger: #fb7185;
      --shadow: 0 24px 90px rgba(0, 0, 0, 0.5);
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 18% 10%, rgba(102, 227, 255, 0.18), transparent 26rem),
        radial-gradient(circle at 82% 88%, rgba(139, 92, 246, 0.24), transparent 28rem),
        linear-gradient(135deg, #07080d 0%, #10111a 48%, #080a10 100%);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.026) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 78%);
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(1280px, calc(100% - 32px));
      height: 100vh;
      height: 100dvh;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
      padding: 22px 0;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(180px, auto) minmax(220px, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(11, 13, 20, 0.72);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(102, 227, 255, 0.38);
      border-radius: 10px;
      background: linear-gradient(145deg, rgba(102, 227, 255, 0.18), rgba(139, 92, 246, 0.34));
      box-shadow: 0 0 34px rgba(139, 92, 246, 0.22);
    }

    h1 {
      margin: 0;
      font-size: 1.32rem;
      letter-spacing: 0;
      line-height: 1;
    }

    .subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .status-pill {
      justify-self: center;
      width: min(520px, 100%);
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--soft);
      background: rgba(255, 255, 255, 0.04);
      font-size: 0.92rem;
      min-width: 0;
    }

    .status-pill span:last-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent-3);
      box-shadow: 0 0 16px rgba(183, 247, 209, 0.75);
      flex: 0 0 auto;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      min-width: max-content;
    }

    .icon-button,
    .reset-button,
    .send-button {
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--text);
      background: rgba(20, 24, 35, 0.88);
    }

    .icon-button {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
    }

    .reset-button {
      min-width: 76px;
      height: 44px;
      color: var(--soft);
    }

    .speaker-toggle[aria-pressed="true"] {
      color: var(--danger);
      border-color: rgba(251, 113, 133, 0.55);
    }

    .layout {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) clamp(260px, 24vw, 320px);
      gap: 16px;
    }

    .chat-panel,
    .side-panel,
    .composer {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .chat-panel {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .chat-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .chat-heading strong {
      font-size: 0.92rem;
      color: var(--soft);
    }

    .chat-heading span {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .messages {
      min-height: 0;
      overflow-y: auto;
      padding: 22px 18px 28px;
      scroll-behavior: smooth;
    }

    .empty-state {
      min-height: 100%;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 32px;
    }

    .empty-state div {
      max-width: 460px;
    }

    .empty-state h2 {
      margin: 0 0 10px;
      color: var(--text);
      font-size: clamp(2rem, 6vw, 4.2rem);
      line-height: 0.95;
    }

    .empty-state p {
      margin: 0;
      line-height: 1.55;
    }

    .message {
      display: grid;
      gap: 6px;
      margin: 0 0 14px;
    }

    .message.user {
      justify-items: end;
    }

    .message.assistant {
      justify-items: start;
    }

    .label {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .bubble {
      max-width: min(680px, 88%);
      padding: 14px 16px;
      border-radius: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .user .bubble {
      color: white;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      box-shadow: 0 12px 30px rgba(79, 70, 229, 0.24);
    }

    .assistant .bubble {
      color: #dce7f7;
      border: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.055);
    }

    .side-panel {
      min-height: 0;
      padding: 16px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 14px;
      overflow: hidden;
    }

    .side-title {
      margin: 0;
      font-size: 0.9rem;
      color: var(--soft);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .metric {
      min-height: 78px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.045);
    }

    .metric b {
      display: block;
      font-size: 1.35rem;
      color: var(--text);
    }

    .metric span {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .shortcuts {
      display: grid;
      align-content: start;
      gap: 8px;
      min-height: 0;
      overflow: auto;
    }

    .chip {
      width: 100%;
      min-height: 42px;
      text-align: left;
      color: var(--soft);
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.045);
      padding: 0 12px;
    }

    .composer {
      display: grid;
      grid-template-columns: 52px minmax(0, 1fr) 52px 52px;
      gap: 10px;
      align-items: end;
      padding: 12px;
    }

    textarea {
      width: 100%;
      max-height: 140px;
      min-height: 52px;
      resize: none;
      border: 1px solid var(--line);
      border-radius: 10px;
      outline: none;
      color: var(--text);
      background: rgba(4, 6, 12, 0.58);
      padding: 14px 16px;
      line-height: 1.45;
    }

    textarea:focus {
      border-color: rgba(102, 227, 255, 0.75);
      box-shadow: 0 0 0 3px rgba(102, 227, 255, 0.12);
    }

    .mic-button.recording {
      color: var(--danger);
      border-color: rgba(251, 113, 133, 0.7);
      box-shadow: 0 0 0 4px rgba(251, 113, 133, 0.12);
    }

    .send-button {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      color: #061016;
      border: 0;
      background: linear-gradient(135deg, var(--accent-2), var(--accent-3));
      font-weight: 800;
    }

    .icon-button:disabled,
    .send-button:disabled {
      opacity: 0.68;
      cursor: wait;
    }

    svg {
      width: 21px;
      height: 21px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    @media (max-width: 1100px) {
      .app {
        width: min(100% - 28px, 1080px);
      }

      .layout {
        grid-template-columns: minmax(0, 1fr) 260px;
      }

      .bubble {
        max-width: min(620px, 92%);
      }
    }

    @media (max-width: 920px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100vh;
        min-height: 100dvh;
        grid-template-rows: auto auto auto;
        padding: 16px 0;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .topbar {
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .status-pill {
        grid-column: 1 / -1;
        grid-row: 2;
        justify-self: stretch;
      }

      .side-panel {
        order: -1;
        grid-template-rows: auto auto;
        overflow: visible;
      }

      .shortcuts {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        overflow: visible;
      }

      .chat-panel {
        min-height: clamp(420px, 62vh, 660px);
      }

      .composer {
        position: sticky;
        bottom: 12px;
        grid-template-columns: 52px minmax(0, 1fr) 52px;
        z-index: 5;
      }

      .composer .speaker-toggle {
        display: none;
      }
    }

    @media (max-width: 640px) {
      .app {
        width: min(100% - 20px, 640px);
        gap: 12px;
        padding: 10px 0;
      }

      .topbar {
        gap: 12px;
        padding: 10px;
      }

      .mark,
      .icon-button {
        width: 42px;
        height: 42px;
      }

      h1 {
        font-size: 1.12rem;
      }

      .subtitle {
        font-size: 0.68rem;
      }

      .status-pill {
        min-height: 38px;
        padding: 0 12px;
        font-size: 0.84rem;
      }

      .reset-button {
        min-width: 66px;
        height: 42px;
      }

      .side-panel {
        padding: 12px;
        gap: 10px;
      }

      .metric-grid,
      .shortcuts {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .metric {
        min-height: 64px;
        padding: 10px;
      }

      .metric b {
        font-size: 1.12rem;
      }

      .chip {
        min-height: 40px;
        padding: 8px 10px;
        font-size: 0.84rem;
      }

      .chat-heading {
        padding: 12px;
      }

      .chat-heading span {
        display: none;
      }

      .messages {
        padding: 16px 12px 22px;
      }

      .empty-state {
        padding: 24px 14px;
      }

      .empty-state h2 {
        font-size: 2.45rem;
      }

      .bubble {
        max-width: 94%;
        padding: 12px 13px;
        font-size: 0.94rem;
      }

      .composer {
        bottom: 10px;
        grid-template-columns: 48px minmax(0, 1fr) 48px;
        gap: 8px;
        padding: 10px;
      }

      textarea {
        min-height: 48px;
        max-height: 116px;
        padding: 12px;
      }

      .send-button {
        width: 48px;
        height: 48px;
      }
    }

    @media (max-width: 420px) {
      .app {
        width: min(100% - 14px, 420px);
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .top-actions {
        width: 100%;
      }

      .reset-button {
        flex: 1;
      }

      .status-pill {
        grid-row: auto;
      }

      .metric-grid,
      .shortcuts {
        grid-template-columns: 1fr;
      }

      .chat-panel {
        min-height: 430px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M12 3v18"></path>
            <path d="m7 6 10 12"></path>
            <path d="m17 6-10 12"></path>
            <path d="M5 12h14"></path>
          </svg>
        </div>
        <div>
          <h1>SNOW</h1>
          <p class="subtitle">AI Voice Assistant</p>
        </div>
      </div>

      <div class="status-pill">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="status">Ready. Tap the mic to talk, or type below.</span>
      </div>

      <div class="top-actions">
        <button class="reset-button" id="resetButton" type="button">Reset</button>
        <button class="icon-button speaker-toggle" id="speakerToggle" type="button" aria-label="Mute output voice" aria-pressed="false" title="Mute output voice">
          <svg id="speakerIcon" viewBox="0 0 24 24">
            <path d="M11 5 6 9H3v6h3l5 4V5z"></path>
            <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
            <path d="M18.5 5.5a9 9 0 0 1 0 13"></path>
          </svg>
        </button>
      </div>
    </header>

    <section class="layout">
      <section class="chat-panel" aria-label="SNOW chat history">
        <div class="chat-heading">
          <strong>Conversation</strong>
          <span id="messageCount">0 messages</span>
        </div>
        <div class="messages" id="messages">
          <div class="empty-state" id="emptyState">
            <div>
              <h2>Ask SNOW</h2>
              <p>Short answers, voice input, and a little personality. Your chat history will build here as you talk.</p>
            </div>
          </div>
        </div>
      </section>

      <aside class="side-panel" aria-label="SNOW session details">
        <h2 class="side-title">Session</h2>
        <div class="metric-grid">
          <div class="metric">
            <b id="turnCount">0</b>
            <span>turns</span>
          </div>
          <div class="metric">
            <b id="voiceState">On</b>
            <span>voice</span>
          </div>
        </div>
        <div class="shortcuts">
          <button class="chip" type="button" data-prompt="Who are you?">Who are you?</button>
          <button class="chip" type="button" data-prompt="What time is it?">What time is it?</button>
          <button class="chip" type="button" data-prompt="What is today's date?">Today's date</button>
          <button class="chip" type="button" data-prompt="Give me a quick coding tip">Quick coding tip</button>
        </div>
      </aside>
    </section>

    <section class="composer" aria-label="Prompt composer">
      <button class="icon-button mic-button" id="micButton" type="button" aria-label="Start voice input" title="Start voice input">
        <svg viewBox="0 0 24 24">
          <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <path d="M12 19v3"></path>
        </svg>
      </button>
      <textarea id="promptInput" placeholder="Message SNOW..." aria-label="Prompt input"></textarea>
      <button class="send-button" id="sendButton" type="button" aria-label="Send prompt" title="Send prompt">
        <svg viewBox="0 0 24 24">
          <path d="m5 12 14-7-7 14-2-5-5-2z"></path>
        </svg>
      </button>
      <button class="icon-button speaker-toggle" id="composerSpeakerToggle" type="button" aria-label="Mute output voice" aria-pressed="false" title="Mute output voice">
        <svg id="composerSpeakerIcon" viewBox="0 0 24 24">
          <path d="M11 5 6 9H3v6h3l5 4V5z"></path>
          <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
          <path d="M18.5 5.5a9 9 0 0 1 0 13"></path>
        </svg>
      </button>
      <audio id="responseAudio" preload="auto"></audio>
    </section>
  </main>

  <script>
    const promptInput = document.getElementById("promptInput");
    const micButton = document.getElementById("micButton");
    const sendButton = document.getElementById("sendButton");
    const resetButton = document.getElementById("resetButton");
    const statusText = document.getElementById("status");
    const messagesEl = document.getElementById("messages");
    const emptyState = document.getElementById("emptyState");
    const messageCount = document.getElementById("messageCount");
    const turnCount = document.getElementById("turnCount");
    const voiceState = document.getElementById("voiceState");
    const speakerToggle = document.getElementById("speakerToggle");
    const composerSpeakerToggle = document.getElementById("composerSpeakerToggle");
    const speakerIcon = document.getElementById("speakerIcon");
    const composerSpeakerIcon = document.getElementById("composerSpeakerIcon");
    const responseAudio = document.getElementById("responseAudio");
    const chips = document.querySelectorAll(".chip");

    const API_URL = window.location.protocol === "file:"
      ? "http://127.0.0.1:5000/api/ask"
      : "/api/ask";
    const TRANSCRIBE_URL = window.location.protocol === "file:"
      ? "http://127.0.0.1:5000/api/transcribe"
      : "/api/transcribe";

    let speakerMuted = localStorage.getItem("snowSpeakerMuted") === "true";
    let history = JSON.parse(localStorage.getItem("snowChatHistory") || "[]");
    let isListening = false;
    let isFinalizingVoice = false;
    let audioContext = null;
    let mediaStream = null;
    let sourceNode = null;
    let processorNode = null;
    let recordedChunks = [];
    let recordingSampleRate = 44100;
    let liveTranscriptBase = "";
    let liveTranscriptText = "";
    let liveRecognition = null;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    function setStatus(message) {
      statusText.textContent = message;
    }

    function saveHistory() {
      localStorage.setItem("snowChatHistory", JSON.stringify(history.slice(-40)));
    }

    function updateCounts() {
      const count = history.length;
      messageCount.textContent = `${count} ${count === 1 ? "message" : "messages"}`;
      turnCount.textContent = String(Math.ceil(count / 2));
      voiceState.textContent = speakerMuted ? "Off" : "On";
    }

    function appendMessage(role, text, options = {}) {
      if (emptyState) {
        emptyState.remove();
      }

      const wrapper = document.createElement("article");
      wrapper.className = `message ${role}`;
      if (options.id) {
        wrapper.dataset.messageId = options.id;
      }

      const label = document.createElement("div");
      label.className = "label";
      label.textContent = role === "user" ? "You" : "SNOW";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      wrapper.append(label, bubble);
      messagesEl.append(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    function renderHistory() {
      messagesEl.innerHTML = "";
      if (history.length === 0) {
        messagesEl.append(emptyState);
      } else {
        history.forEach((message) => appendMessage(message.role, message.text));
      }
      updateCounts();
    }

    function updateSpeakerIcon() {
      const mutedMarkup = `
        <path d="M11 5 6 9H3v6h3l5 4V5z"></path>
        <path d="m16 9 5 6"></path>
        <path d="m21 9-5 6"></path>
      `;
      const unmutedMarkup = `
        <path d="M11 5 6 9H3v6h3l5 4V5z"></path>
        <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
        <path d="M18.5 5.5a9 9 0 0 1 0 13"></path>
      `;

      speakerIcon.innerHTML = speakerMuted ? mutedMarkup : unmutedMarkup;
      composerSpeakerIcon.innerHTML = speakerMuted ? mutedMarkup : unmutedMarkup;

      [speakerToggle, composerSpeakerToggle].forEach((button) => {
        button.setAttribute("aria-pressed", String(speakerMuted));
        button.setAttribute("aria-label", speakerMuted ? "Unmute output voice" : "Mute output voice");
        button.setAttribute("title", speakerMuted ? "Unmute output voice" : "Mute output voice");
      });

      voiceState.textContent = speakerMuted ? "Off" : "On";
    }

    function toggleSpeaker() {
      speakerMuted = !speakerMuted;
      localStorage.setItem("snowSpeakerMuted", String(speakerMuted));
      responseAudio.muted = speakerMuted;
      if (speakerMuted) {
        responseAudio.pause();
      }
      updateSpeakerIcon();
    }

    function encodeWav(chunks, sampleRate) {
      const length = chunks.reduce((total, chunk) => total + chunk.length, 0);
      const samples = new Float32Array(length);
      let offset = 0;

      chunks.forEach((chunk) => {
        samples.set(chunk, offset);
        offset += chunk.length;
      });

      const buffer = new ArrayBuffer(44 + samples.length * 2);
      const view = new DataView(buffer);

      function writeString(position, value) {
        for (let i = 0; i < value.length; i += 1) {
          view.setUint8(position + i, value.charCodeAt(i));
        }
      }

      writeString(0, "RIFF");
      view.setUint32(4, 36 + samples.length * 2, true);
      writeString(8, "WAVE");
      writeString(12, "fmt ");
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeString(36, "data");
      view.setUint32(40, samples.length * 2, true);

      let position = 44;
      for (let i = 0; i < samples.length; i += 1) {
        const sample = Math.max(-1, Math.min(1, samples[i]));
        view.setInt16(position, sample < 0 ? sample * 0x8000 : sample * 0x7fff, true);
        position += 2;
      }

      return new Blob([view], { type: "audio/wav" });
    }

    async function startVoiceInput() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus("Microphone recording needs Chrome or Edge at http://127.0.0.1:5000/.");
        return;
      }

      recordedChunks = [];
      liveTranscriptBase = promptInput.value.trim();
      liveTranscriptText = "";
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioContext = new AudioContext();
      recordingSampleRate = audioContext.sampleRate;
      sourceNode = audioContext.createMediaStreamSource(mediaStream);
      processorNode = audioContext.createScriptProcessor(4096, 1, 1);

      processorNode.onaudioprocess = (event) => {
        recordedChunks.push(new Float32Array(event.inputBuffer.getChannelData(0)));
      };

      sourceNode.connect(processorNode);
      processorNode.connect(audioContext.destination);

      isListening = true;
      micButton.classList.add("recording");
      micButton.setAttribute("aria-label", "Stop voice input");
      micButton.setAttribute("title", "Stop voice input");
      setStatus("Recording... click the mic again when you are done.");
      startLiveTranscript();
    }

    function renderLiveTranscript() {
      promptInput.value = `${liveTranscriptBase} ${liveTranscriptText}`.replace(/\s+/g, " ").trim();
    }

    function startLiveTranscript() {
      if (!SpeechRecognition) {
        setStatus("Recording... live preview is not supported here, but final transcription will still work.");
        return;
      }

      liveRecognition = new SpeechRecognition();
      liveRecognition.lang = "en-US";
      liveRecognition.interimResults = true;
      liveRecognition.continuous = true;

      liveRecognition.onresult = (event) => {
        let interimTranscript = "";

        for (let i = event.resultIndex; i < event.results.length; i += 1) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            liveTranscriptText = `${liveTranscriptText} ${transcript}`.trim();
          } else {
            interimTranscript += transcript;
          }
        }

        promptInput.value = `${liveTranscriptBase} ${liveTranscriptText} ${interimTranscript}`
          .replace(/\s+/g, " ")
          .trim();
      };

      liveRecognition.onerror = () => {
        liveRecognition = null;
      };

      liveRecognition.onend = () => {
        if (isListening && liveRecognition) {
          try {
            liveRecognition.start();
          } catch {
            liveRecognition = null;
          }
        }
      };

      try {
        liveRecognition.start();
      } catch {
        liveRecognition = null;
      }
    }

    function stopLiveTranscript() {
      if (!liveRecognition) {
        return;
      }

      const recognition = liveRecognition;
      liveRecognition = null;
      recognition.onend = null;
      recognition.onerror = null;

      try {
        recognition.stop();
      } catch {
        // The browser may already have stopped live recognition.
      }
    }

    async function stopVoiceInput() {
      isListening = false;
      isFinalizingVoice = true;
      sendButton.disabled = true;
      micButton.classList.remove("recording");
      micButton.setAttribute("aria-label", "Start voice input");
      micButton.setAttribute("title", "Start voice input");
      setStatus("Transcribing your voice...");
      stopLiveTranscript();

      if (processorNode) processorNode.disconnect();
      if (sourceNode) sourceNode.disconnect();
      if (mediaStream) mediaStream.getTracks().forEach((track) => track.stop());
      if (audioContext) await audioContext.close();

      const audioBlob = encodeWav(recordedChunks, recordingSampleRate);
      const formData = new FormData();
      formData.append("audio", audioBlob, "voice_input.wav");

      const response = await fetch(TRANSCRIBE_URL, {
        method: "POST",
        body: formData
      });

      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.error || "Voice transcription failed.");
      }

      promptInput.value = data.transcript;
      setStatus("Voice captured. Send it to SNOW.");
      isFinalizingVoice = false;
      sendButton.disabled = false;
    }

    async function toggleVoiceInput() {
      micButton.disabled = true;
      try {
        if (isListening) {
          await stopVoiceInput();
        } else {
          await startVoiceInput();
        }
      } catch (error) {
        isListening = false;
        isFinalizingVoice = false;
        micButton.classList.remove("recording");
        micButton.setAttribute("aria-label", "Start voice input");
        micButton.setAttribute("title", "Start voice input");
        setStatus(error.message);
      } finally {
        micButton.disabled = false;
      }
    }

    async function sendPrompt() {
      if (isListening) {
        try {
          await stopVoiceInput();
        } catch (error) {
          isFinalizingVoice = false;
          sendButton.disabled = false;
          setStatus(error.message);
          return;
        }
      }

      if (isFinalizingVoice) {
        setStatus("Wait for the final voice transcript, then send.");
        return;
      }

      const prompt = promptInput.value.trim();
      if (!prompt) {
        setStatus("Type or speak a prompt first.");
        return;
      }

      history.push({ role: "user", text: prompt });
      appendMessage("user", prompt);
      const thinkingBubble = appendMessage("assistant", "SNOW is thinking...", { id: "thinking" });
      saveHistory();
      updateCounts();

      promptInput.value = "";
      sendButton.disabled = true;
      micButton.disabled = true;
      setStatus("Asking SNOW...");

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            prompt,
            voice_enabled: !speakerMuted
          })
        });

        const contentType = response.headers.get("content-type") || "";
        if (!contentType.includes("application/json")) {
          throw new Error("Open the app from http://127.0.0.1:5000/ and make sure app.py is running.");
        }

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || "SNOW request failed.");
        }

        thinkingBubble.textContent = data.answer;
        history.push({ role: "assistant", text: data.answer });
        saveHistory();
        updateCounts();

        if (!data.audio_url) {
          responseAudio.removeAttribute("src");
          responseAudio.load();
          setStatus("Answer ready. Voice is muted.");
          return;
        }

        responseAudio.src = data.audio_url;
        responseAudio.muted = speakerMuted;
        await responseAudio.play();
        setStatus("Answer ready.");
      } catch (error) {
        thinkingBubble.textContent = "SNOW could not answer that request.";
        setStatus(error.message);
      } finally {
        sendButton.disabled = false;
        micButton.disabled = false;
      }
    }

    function resetChat() {
      history = [];
      localStorage.removeItem("snowChatHistory");
      messagesEl.innerHTML = "";
      messagesEl.append(emptyState);
      updateCounts();
      setStatus("Conversation reset.");
      promptInput.focus();
    }

    micButton.addEventListener("click", toggleVoiceInput);
    sendButton.addEventListener("click", sendPrompt);
    resetButton.addEventListener("click", resetChat);
    speakerToggle.addEventListener("click", toggleSpeaker);
    composerSpeakerToggle.addEventListener("click", toggleSpeaker);

    chips.forEach((chip) => {
      chip.addEventListener("click", () => {
        promptInput.value = chip.dataset.prompt || "";
        promptInput.focus();
      });
    });

    promptInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendPrompt();
      }
    });

    updateSpeakerIcon();
    renderHistory();
  </script>
</body>
</html>
